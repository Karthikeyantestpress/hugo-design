{{ define "main" }}
<div class="max-w-[85rem] px-4 py-10 sm:px-6 lg:px-8 lg:py-14 mx-auto">
  <div class="max-w-2xl mx-auto text-center mb-10 lg:mb-14">
    <h2 class="text-2xl font-bold md:text-3xl md:leading-tight text-foreground">{{ .Title }}</h2>
    {{ if .Description }}<p class="mt-1 text-muted-foreground">{{ .Description }}</p>{{ end }}
  </div>

  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
    {{ range where .RegularPages "Params.component" "!=" true }}
      <a class="group flex flex-col justify-center hover:bg-background-2 rounded-xl p-4 md:p-7 border border-card-line bg-card shadow-sm transition hover:shadow-md" href="{{ .RelPermalink }}">
        <div class="flex justify-between items-center">
          <div class="flex flex-col">
            <h3 class="font-semibold text-foreground group-hover:text-primary">
              {{ .Title }}
            </h3>
            <span class="text-sm text-muted-foreground">{{ .File.BaseFileName }}</span>
          </div>
          <svg class="flex-shrink-0 size-5 text-muted-foreground group-hover:text-primary" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
